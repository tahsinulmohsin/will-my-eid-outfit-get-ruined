                    { emoji: '💧', text: "বাইরে ঝমঝম বৃষ্টি। তোমার ফিটনেস 'ঈদ মুবারক' থেকে 'ঈদ ডুবারক' হতে যাচ্ছে।" },
                ],
                freezing: [
                    { emoji: '🥶', text: "বাইরে কনকনে ঠান্ডা। তোমার সুন্দর পোশাক ৪ লেয়ারের নিচে ঢাকা থাকবে।" },
                    { emoji: '❄️', text: "হিমাঙ্কের নিচে তাপমাত্রা। সেই পাতলা সিল্কের পাঞ্জাবি? সাহসী চয়েস। খুব সাহসী। খুব ঠান্ডা।" },
                    { emoji: '🧊', text: "আশা করি তোমার ঈদের পোশাকে থার্মাল লাইনিং আছে। তোমার দরকার হবে।" },
                ],
                hot: [
                    { emoji: '🥵', text: "প্রচন্ড গরম। প্রথম সেলফির আগেই মেকআপ গলে যাবে। ব্লটিং পেপার নিয়ে যাও।" },
                    { emoji: '🔥', text: "বাইরে তোমার বিরিয়ানির চেয়েও গরম। ৫ লেয়ারের পোশাক বাদ দাও।" },
                    { emoji: '☀️', text: "রোদ জ্বলছে। SPF লাগাও, না হলে গ্লো-আপ বার্ন-ডাউন হয়ে যাবে।" },
                ],
            }
        };

        // ─── i18n — Error Messages ───────────────────────
        const errorMessages = {
            en: {
                1: 'Location permission denied. Please allow access in your browser settings.',
                2: 'Location unavailable. Please try again later.',
                3: 'Location request timed out. Please try again.',
                noGeo: 'Geolocation is not supported by your browser.',
                api: 'Weather API error — please try again.',
                unknown: 'An unknown location error occurred.',
            },
            bn: {
                1: 'লোকেশন পারমিশন দেওয়া হয়নি। ব্রাউজার সেটিংসে গিয়ে অনুমতি দিন।',
                2: 'লোকেশন পাওয়া যাচ্ছে না। পরে আবার চেষ্টা করুন।',
                3: 'লোকেশন রিকোয়েস্ট টাইমআউট হয়েছে। আবার চেষ্টা করুন।',
                noGeo: 'আপনার ব্রাউজার জিওলোকেশন সাপোর্ট করে না।',
                api: 'আবহাওয়া API ত্রুটি — আবার চেষ্টা করুন।',
                unknown: 'একটি অজানা লোকেশন ত্রুটি ঘটেছে।',
            }
        };

        // ─── Helpers ─────────────────────────────────────
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function showScreen(screen) {
            [$loading, $result, $error].forEach(s => {
                s.classList.add('hidden');
                s.classList.remove('flex');
            });
            screen.classList.remove('hidden');
            screen.classList.add('flex');
        }

        function spawnParticles(isGood) {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            const colors = isGood
                ? ['#daa520','#228B22','#FFD700','#32CD32','#f5e6a3']
                : ['#6b7280','#3b82f6','#93c5fd','#475569','#9ca3af'];
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 10 + 4;
                p.style.cssText = `
                    width:${size}px; height:${size}px;
                    left:${Math.random()*100}vw;
                    bottom:-20px;
                    background:${colors[i % colors.length]};
                    animation-delay:${Math.random()*6}s;
                    animation-duration:${4 + Math.random()*5}s;
                `;
                container.appendChild(p);
            }
        }

        // ─── Weather Code Helpers ────────────────────────
        const rainyOrBadCodes = new Set([
            51,53,55,56,57,61,63,65,66,67,
            71,73,75,77,80,81,82,85,86,95,96,99,
        ]);

        function weatherCodeToLabel(code, lang) {
            return (weatherLabels[lang] || weatherLabels.en)[code] || (lang === 'bn' ? 'অজানা' : 'Unknown');
        }

        function weatherCodeToIcon(code) {
            if ([0,1].includes(code))  return '☀️';
            if ([2,3].includes(code))  return '⛅';
            if ([45,48].includes(code)) return '🌫️';
            if ([51,53,55,56,57].includes(code)) return '🌦️';
            if ([61,63,65,66,67].includes(code)) return '🌧️';
            if ([71,73,75,77,85,86].includes(code)) return '🌨️';
            if ([80,81,82].includes(code)) return '🌧️';
            if ([95,96,99].includes(code)) return '⛈️';
            return '🌡️';
        }

        // ─── Language Switching ──────────────────────────
        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-bn').classList.toggle('active', lang === 'bn');
            document.documentElement.lang = lang === 'bn' ? 'bn' : 'en';

            // Update static UI strings
            const s = ui[lang];
            document.getElementById('loading-title').textContent     = s.loadingTitle;
            document.getElementById('loading-subtitle').textContent  = s.loadingSubtitle;
            document.getElementById('footer-text').textContent       = s.footerText;
            document.getElementById('retry-btn').textContent         = s.retryBtn;
            document.getElementById('error-title').textContent       = s.errorTitle;
            document.getElementById('error-retry-btn').textContent   = s.errorRetryBtn;

            // If we already have weather data, re-render the result
            if (lastWeatherData) {
                renderResult(lastWeatherData);
            }
        }

        // ─── Main Logic ─────────────────────────────────
        async function init() {
            try {
                const pos = await getLocation();
                const { latitude, longitude } = pos.coords;
                const weather = await fetchWeather(latitude, longitude);
                lastWeatherData = weather;
                renderResult(weather);
            } catch (err) {
                showError(err);
            }
        }

        function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject({ code: 'noGeo' });
                    return;
                }
                navigator.geolocation.getCurrentPosition(resolve, (err) => {
                    reject({ code: err.code });
                }, { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 });
            });
        }

        async function fetchWeather(lat, lon) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&timezone=auto`;
            const res = await fetch(url);
            if (!res.ok) throw { code: 'api' };
            const data = await res.json();
            return data.current;
        }

        // ─── Render Result ───────────────────────────────
        function renderResult(w) {
            const lang   = currentLang;
            const s      = ui[lang];
            const code   = w.weather_code;
            const temp   = w.temperature_2m;
            const precip = w.precipitation;
            const wind   = w.wind_speed_10m;
            const humidity = w.relative_humidity_2m;
            const feelsLike = w.apparent_temperature;

            const isBadWeather = rainyOrBadCodes.has(code) || precip > 0.5;
            const isFreezing   = temp < 5;
            const isScorching  = temp > 38;
            const ruined       = isBadWeather || isFreezing;

            // Pick advice
            const pool = advice[lang];
            let chosen;
            if (isBadWeather)      chosen = pick(pool.bad);
            else if (isFreezing)   chosen = pick(pool.freezing);
            else if (isScorching)  chosen = pick(pool.hot);
            else                   chosen = pick(pool.good);

            // Apply verdict
            const $verdict = document.getElementById('verdict');
            $verdict.textContent = ruined ? s.verdictYes : s.verdictNo;
            // Adjust font size for Bengali (longer text)
            $verdict.classList.toggle('verdict-bn', lang === 'bn');

            // Apply advice
            document.getElementById('advice-emoji').textContent = chosen.emoji;
            document.getElementById('advice-text').textContent  = chosen.text;

            // Background
            $body.classList.remove('bg-loading', 'bg-good', 'bg-bad');
            $body.classList.add(ruined ? 'bg-bad' : 'bg-good');

            // Weather chips
            const chipsHtml = `
                <span class="chip">${weatherCodeToIcon(code)} ${weatherCodeToLabel(code, lang)}</span>
                <span class="chip">🌡️ ${temp}°C</span>
                <span class="chip">🤔 ${s.feels} ${feelsLike}°C</span>
                <span class="chip">💧 ${precip} mm</span>
                <span class="chip">💨 ${wind} km/h</span>
                <span class="chip">💦 ${humidity}%</span>
            `;
            document.getElementById('weather-chips').innerHTML = chipsHtml;

            // Particles
            spawnParticles(!ruined);

            // Show
            showScreen($result);
        }

        // ─── Error ───────────────────────────────────────
        function showError(err) {
            const lang = currentLang;
            const msgs = errorMessages[lang];
            const msg  = msgs[err.code] || msgs.unknown || ui[lang].errorDefault;
            document.getElementById('error-msg').textContent = msg;
            showScreen($error);
        }

        // ─── Go ──────────────────────────────────────────
        init();
    </script>
</body>
</html>
